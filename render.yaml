services:
  - type: web
    name: interviewiq-1-server
    env: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false

  - type: static
    name: interviewiq-1-client
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://interviewiq-1-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
